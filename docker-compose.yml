services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notifications
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    # Run migrations + seed, then start the server.
    command: >-
      sh -c "node dist/infrastructure/db/migrate.js &&
             node dist/infrastructure/db/seed.js &&
             node dist/index.js"

volumes:
  pgdata:
